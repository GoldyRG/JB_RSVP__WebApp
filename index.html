<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Justin Bieber-themed RSVP experience with modern customization."
    />
    <title>JB Birthday RSVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <header class="hero">
      <p class="eyebrow">Justin Bieber Vibes</p>
      <h1>Birthday RSVP Experience</h1>
      <p class="subtitle">
        A modern, customizable purple-to-white party page for the ultimate
        pop celebration.
      </p>
    </header>

    <main class="layout">
      <section class="card customizer" aria-labelledby="customizer-title">
        <h2 id="customizer-title">Customize Your Look</h2>
        <label for="purpleRange">
          Purple Intensity
          <input id="purpleRange" type="range" min="40" max="95" value="75" />
        </label>
        <label for="glowToggle">
          Glow Effects
          <input id="glowToggle" type="checkbox" checked />
        </label>
        <label for="motionToggle">
          Reduce Motion
          <input id="motionToggle" type="checkbox" />
        </label>
      </section>

      <section class="card rsvp" aria-labelledby="rsvp-title">
        <h2 id="rsvp-title">RSVP</h2>
        <form id="rsvpForm" novalidate>
          <label for="name">
            Name
            <input id="name" name="name" type="text" placeholder="Your name" required />
          </label>
          <label for="email">
            Email
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              required
            />
          </label>
          <label for="message">
            Message
            <textarea id="message" name="message" rows="3" placeholder="Can't wait!"></textarea>
          </label>
          <button type="submit">Submit RSVP</button>
        </form>
        <p id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
