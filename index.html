<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Justin Bieber birthday RSVP page with one guest-count RSVP form."
    />
    <title>Belieber Birthday RSVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-song-src="./assets/babyJB.wav">
    <div class="stage-lights" aria-hidden="true"></div>

    <main class="page-wrap">
      <h1 class="title">   Bianca's Bieber Bash RSVP   </h1>

      <section class="rsvp-panel" aria-labelledby="rsvp-title">
        <p class="panel-copy">
          Choose Accept if you are attending, or Decline if you cannot make it.
        </p>

        <form id="rsvpForm" novalidate>
          <label for="guestName">Your Name</label>
          <input
            id="guestName"
            name="guestName"
            type="text"
            placeholder="Enter your name"
            autocomplete="name"
            required
          />

          <fieldset class="attendance-group">
            <legend>Are you attending?</legend>
            <label class="choice-pill" for="attendingYes">
              <input
                id="attendingYes"
                type="radio"
                name="attendance"
                value="rsvp"
                checked
                required
              />
              <span>Accept</span>
            </label>
            <label class="choice-pill" for="attendingNo">
              <input id="attendingNo" type="radio" name="attendance" value="deny" required />
              <span>Decline</span>
            </label>
          </fieldset>

          <label for="guestCount">Number of people visiting</label>
          <input
            id="guestCount"
            name="guestCount"
            type="number"
            min="1"
            max="20"
            value="1"
            required
          />

          <div class="guest-names-group" id="guestNamesGroup" hidden>
            <label>Guest Names</label>
            <p class="guest-names-helper">Add a name for every additional guest.</p>
            <div id="guestNamesInputs" class="guest-names-inputs"></div>
          </div>

          <button type="submit">Send RSVP</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <div class="jb-collage" aria-hidden="true">
        <img
          class="jb-shot shot-1"
          src="./assets/JB1.jpg"
          alt=""
          loading="lazy"
        />
        <img
          class="jb-shot shot-2"
          src="./assets/JB2.jpg"
          alt=""
          loading="lazy"
        />
        <img
          class="jb-shot shot-3"
          src="./assets/JB3.jpg"
          alt=""
          loading="lazy"
        />
        <img
          class="jb-shot shot-4"
          src="./assets/JB4.jpg"
          alt=""
          loading="lazy"
        />
      </div>
    </main>

    <aside class="music-dock" aria-label="Background music controls">
      <button id="musicToggle" type="button" aria-pressed="false">Play</button>
    </aside>

    <audio id="bgMusic" preload="auto" loop>
      <source src="./assets/babyJB.wav" type="audio/wav" />
    </audio>

    <script src="./music-player.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
