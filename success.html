<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP Confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #f5f1ff;
        --muted: #c9b9d9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Outfit", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 460px at 18% 8%, rgba(186, 100, 255, 0.32), transparent 60%),
          radial-gradient(900px 600px at 82% 22%, rgba(212, 165, 255, 0.24), transparent 60%),
          linear-gradient(160deg, #1a0f2e, #0d051a);
        padding: 1rem;
        animation: fadeIn 0.8s ease-out;
        overflow: hidden;
        position: relative;
        isolation: isolate;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -28vmax;
        pointer-events: none;
        z-index: 0;
      }
      body::before {
        background: conic-gradient(
          from 110deg,
          rgba(224, 170, 255, 0.08),
          rgba(255, 255, 255, 0.04),
          rgba(157, 78, 221, 0.12),
          rgba(224, 170, 255, 0.08)
        );
        animation: auroraSpin 22s linear infinite;
      }
      body::after {
        background:
          radial-gradient(circle at 20% 25%, rgba(255, 255, 255, 0.16), transparent 48%),
          radial-gradient(circle at 78% 18%, rgba(186, 100, 255, 0.26), transparent 54%),
          radial-gradient(circle at 50% 90%, rgba(224, 170, 255, 0.16), transparent 56%);
        animation: auroraSpin 32s linear infinite reverse;
      }
      .edge-effects {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      .edge-rail {
        position: absolute;
        top: 1vh;
        bottom: 1vh;
        width: 14px;
        border-radius: 999px;
        opacity: 0.96;
        filter: blur(1.1px);
        box-shadow: 0 0 26px rgba(224, 170, 255, 0.48);
      }
      .edge-rail.left {
        left: clamp(6px, 1.5vw, 18px);
        background: linear-gradient(to bottom, transparent, rgba(224, 170, 255, 1), transparent);
        animation: edgePulse 2.4s ease-in-out infinite, railDrift 6.2s ease-in-out infinite;
      }
      .edge-rail.right {
        right: clamp(6px, 1.5vw, 18px);
        background: linear-gradient(to bottom, transparent, rgba(199, 125, 255, 1), transparent);
        animation: edgePulse 2.4s ease-in-out infinite reverse, railDrift 7.2s ease-in-out infinite reverse;
      }
      .edge-orb {
        position: absolute;
        width: 19px;
        height: 19px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff, #c77dff 65%);
        box-shadow: 0 0 34px rgba(199, 125, 255, 0.78);
      }
      .edge-orb.left {
        left: clamp(2px, 1vw, 12px);
        animation: floatArcLeft 8.5s cubic-bezier(0.22, 0.61, 0.36, 1) infinite;
      }
      .edge-orb.right {
        right: clamp(2px, 1vw, 12px);
        animation: floatArcRight 10.2s cubic-bezier(0.22, 0.61, 0.36, 1) infinite 1.2s;
      }
      .edge-orb.orb-1 {
        top: 90vh;
      }
      .edge-orb.orb-2 {
        top: 68vh;
        width: 14px;
        height: 14px;
        opacity: 0.88;
      }
      .edge-orb.orb-3 {
        top: 95vh;
        width: 10px;
        height: 10px;
        opacity: 0.72;
      }
      .edge-ring {
        position: absolute;
        width: min(22vw, 230px);
        aspect-ratio: 1;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.28);
        box-shadow: 0 0 28px rgba(224, 170, 255, 0.38), inset 0 0 22px rgba(199, 125, 255, 0.24);
        mix-blend-mode: screen;
        opacity: 0.82;
      }
      .edge-ring.left {
        left: -92px;
        top: 12vh;
        animation: ringBob 6.2s ease-in-out infinite;
      }
      .edge-ring.right {
        right: -92px;
        bottom: 12vh;
        animation: ringBob 7.1s ease-in-out infinite reverse;
      }
      .panel {
        width: min(700px, 100%);
        border-radius: 24px;
        border: 1px solid rgba(186, 100, 255, 0.28);
        background: rgba(26, 15, 46, 0.88);
        backdrop-filter: blur(8px);
        padding: 1.6rem;
        text-align: center;
        animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
        box-shadow: 0 34px 80px rgba(12, 6, 24, 0.58);
        position: relative;
        z-index: 2;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 9vw, 4.6rem);
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.04em;
        animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
      }
      p {
        margin: 0.5rem auto 0;
        max-width: 45ch;
        color: var(--muted);
      }
      .badge {
        margin: 1rem auto 0;
        display: inline-block;
        padding: 0.35rem 0.72rem;
        border-radius: 999px;
        background: linear-gradient(94deg, #9d4edd, #e0aaff);
        color: #0f051a;
        font-weight: 700;
        animation: pulse 2s ease-in-out infinite;
      }
      .back {
        margin-top: 1.25rem;
        display: inline-block;
        text-decoration: none;
        color: #0f051a;
        font-weight: 700;
        border-radius: 999px;
        padding: 0.62rem 1.1rem;
        background: linear-gradient(96deg, #c77dff, #e0aaff);
        transition: all 0.3s ease;
      }
      .back:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(124, 58, 237, 0.4);
      }
      .placeholders {
        margin-top: 1.2rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.6rem;
        text-align: left;
      }
      .placeholder-card {
        border-radius: 14px;
        border: 1px dashed rgba(186, 100, 255, 0.28);
        background: rgba(255, 255, 255, 0.03);
        padding: 0.8rem;
        animation: slideUp 0.6s ease-out backwards;
        animation-delay: calc(0.3s + var(--index, 0) * 0.1s);
        transition: all 0.3s ease;
      }
      .placeholder-card:hover {
        border-color: rgba(186, 100, 255, 0.5);
        background: rgba(186, 100, 255, 0.08);
        transform: translateY(-4px);
      }
      .placeholder-card h3 {
        margin: 0;
        font-size: 0.95rem;
      }
      .placeholder-card p {
        margin-top: 0.35rem;
        font-size: 0.82rem;
      }
      .image-card {
        grid-column: 1 / -1;
        padding: 0;
        border: 1px solid rgba(186, 100, 255, 0.36);
        background: rgba(255, 255, 255, 0.02);
        overflow: hidden;
        max-width: min(100%, 600px);
        margin: 0 auto;
        width: 100%;
      }
      .image-card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        object-position: center;
        border-radius: 14px;
        display: block;
        transition: transform 0.55s ease;
      }
      .image-card:hover img {
        transform: scale(1.04);
      }
      .response-copy {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0.75rem 0.25rem;
        border: 0;
        background: transparent;
        width: 100%;
        max-width: none;
        margin: 0 auto;
      }
      .response-copy .response-line {
        margin: 0;
        font-family: "Bebas Neue", Impact, sans-serif;
        letter-spacing: 0.06em;
        font-size: clamp(2rem, 5.5vw, 3rem);
        line-height: 0.95;
        color: #f7efff;
        text-transform: uppercase;
        text-shadow: 0 0 22px rgba(212, 165, 255, 0.42);
        max-width: none;
        width: 100%;
      }
      .response-copy .response-date {
        margin: 0.4rem 0 0;
        position: relative;
        display: inline-block;
        padding: 0.08rem 0.4rem;
        display: block;
        width: 100%;
        text-align: center;
        font-size: clamp(1rem, 2.8vw, 1.25rem);
        font-weight: 700;
        color: #d8bbff;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 6px rgba(255, 255, 255, 0.35),
          0 0 14px rgba(214, 171, 255, 0.45),
          0 0 26px rgba(124, 58, 237, 0.22);
        animation: dateGlow 3.8s ease-in-out infinite;
      }
      .music-dock {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        animation: slideIn 0.6s ease-out 0.4s backwards;
        z-index: 3;
      }
      #musicToggle {
        width: auto;
        min-width: 6.4rem;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 999px;
        padding: 0.72rem 1rem;
        font-weight: 700;
        cursor: pointer;
        color: #f8f2ff;
        background: linear-gradient(140deg, rgba(124, 58, 237, 0.92), rgba(212, 165, 255, 0.86));
        box-shadow: 0 12px 26px rgba(8, 8, 20, 0.44), inset 0 1px 0 rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(12px);
        transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      }
      #musicToggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 30px rgba(8, 8, 20, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.28);
        background: linear-gradient(140deg, rgba(139, 92, 246, 0.96), rgba(224, 170, 255, 0.9));
      }
      #musicToggle[aria-pressed="true"] {
        background: linear-gradient(140deg, rgba(99, 102, 241, 0.92), rgba(167, 139, 250, 0.88));
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes pulse {
        0%, 100% {
          box-shadow: 0 0 0 0 rgba(186, 100, 255, 0.4);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(186, 100, 255, 0);
        }
      }
      @keyframes dateGlow {
        0% {
          text-shadow:
            0 0 5px rgba(255, 255, 255, 0.28),
            0 0 12px rgba(214, 171, 255, 0.38),
            0 0 22px rgba(124, 58, 237, 0.18);
        }
        50% {
          text-shadow:
            0 0 10px rgba(255, 255, 255, 0.5),
            0 0 20px rgba(214, 171, 255, 0.65),
            0 0 36px rgba(124, 58, 237, 0.3);
        }
        100% {
          text-shadow:
            0 0 5px rgba(255, 255, 255, 0.28),
            0 0 12px rgba(214, 171, 255, 0.38),
            0 0 22px rgba(124, 58, 237, 0.18);
        }
      }
      @keyframes edgePulse {
        0%, 100% {
          opacity: 0.56;
          transform: scaleY(0.88);
        }
        50% {
          opacity: 1;
          transform: scaleY(1.07);
        }
      }
      @keyframes railDrift {
        0%,
        100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(2px);
        }
      }
      @keyframes floatArcLeft {
        0% {
          transform: translate(0, 0) scale(0.85);
          opacity: 0;
        }
        12% {
          opacity: 0.95;
        }
        60% {
          transform: translate(9px, -48vh) scale(1.05);
        }
        100% {
          transform: translate(-6px, -94vh) scale(0.8);
          opacity: 0;
        }
      }
      @keyframes floatArcRight {
        0% {
          transform: translate(0, 0) scale(0.9);
          opacity: 0;
        }
        12% {
          opacity: 0.95;
        }
        62% {
          transform: translate(-10px, -52vh) scale(1.08);
        }
        100% {
          transform: translate(8px, -96vh) scale(0.75);
          opacity: 0;
        }
      }
      @keyframes auroraSpin {
        from {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.06);
        }
        to {
          transform: rotate(360deg) scale(1);
        }
      }
      @keyframes ringBob {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.72;
        }
        50% {
          transform: translateY(-14px) scale(1.06);
          opacity: 0.95;
        }
      }
      @media (max-width: 760px) {
        .placeholders {
          grid-template-columns: 1fr;
        }
        .edge-rail {
          width: 7px;
          top: 5vh;
          bottom: 13vh;
          opacity: 0.8;
        }
        .edge-orb {
          width: 12px;
          height: 12px;
          box-shadow: 0 0 16px rgba(199, 125, 255, 0.62);
        }
        .edge-ring {
          width: 120px;
          opacity: 0.42;
        }
        .panel {
          padding: 1.15rem;
        }
        .response-copy {
          padding: 0.5rem 0;
        }
        .response-copy .response-line {
          font-size: clamp(1.55rem, 7.8vw, 2.3rem);
          letter-spacing: 0.04em;
          line-height: 0.98;
        }
        .response-copy .response-date {
          font-size: clamp(0.95rem, 4.8vw, 1.1rem);
        }
        .music-dock {
          right: 0.75rem;
          bottom: 0.75rem;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body data-song-src="./assets/AcceptSong.wav">
    <div class="edge-effects" aria-hidden="true">
      <span class="edge-rail left"></span>
      <span class="edge-rail right"></span>
      <span class="edge-orb left orb-1"></span>
      <span class="edge-orb left orb-2"></span>
      <span class="edge-orb right orb-1"></span>
      <span class="edge-orb right orb-3"></span>
      <span class="edge-ring left"></span>
      <span class="edge-ring right"></span>
    </div>
    <main class="panel">
      <h1>YOU ARE ON THE LIST</h1>
      <span class="badge" style="background: linear-gradient(94deg, #9d4edd, #e0aaff); color: #0f051a;">RSVP received. Get ready for a night full of Justin Bieber vibes!</span>

      <section class="placeholders" aria-label="Customization placeholders">
        <article class="placeholder-card image-card">
          <img src="./assets/successJB.jpg" alt="Celebration moment" loading="lazy" />
        </article>
        <article class="placeholder-card response-copy" aria-label="Success message">
          <p class="response-line">See you then!</p>
          <p class="response-date"><time datetime="2026-05-15">May 15, 2026</time></p>
        </article>
      </section>

      <a class="back" href="./index.html">Back To RSVP Form</a>
    </main>

    <aside class="music-dock" aria-label="Background music controls">
      <button id="musicToggle" type="button" aria-pressed="false">Play</button>
    </aside>

    <audio id="bgMusic" preload="auto" loop>
      <source src="./assets/AcceptSong.wav" type="audio/wav" />
    </audio>
    
    <script src="./music-player.js"></script>
  </body>
</html>
